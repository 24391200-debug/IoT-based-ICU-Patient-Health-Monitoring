```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Monitoring Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

header{
background:#1e293b;
padding:20px;
}

h1{
margin:5px;
}

h2{
color:#38bdf8;
margin-top:0;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.value{
font-size:35px;
color:#22c55e;
margin-top:10px;
}

.label{
font-size:18px;
color:#cbd5f5;
}

#ecgCard{
grid-column:span 2;
}

.hidden{
display:none;
}

.status{
color:#f87171;
margin-bottom:20px;
}

canvas{
background:#020617;
border-radius:10px;
}

/* LOGIN PAGE */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.loginBox{
background:#1e293b;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

input{
padding:10px;
margin:10px;
width:250px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#38bdf8;
border:none;
color:black;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="loginBox">

<h2>Admin Login</h2>

<input type="text" id="adminId" placeholder="Admin ID"><br>

<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="loginError"></p>

</div>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<header>
<h1>SHANMUGHA POLYTECHNIC COLLEGE</h1>
<h2>DEPARTMENT OF ELECTRICAL AND ELECTRONICS</h2>
<h3>Health Monitoring Dashboard</h3>
</header>

<div class="status" id="status">
Waiting for realtime data...
</div>

<div class="container">

<div class="card" id="ecgCard">
<div class="label">ECG Graph</div>
<canvas id="ecgChart"></canvas>
</div>

<div class="card" id="pulseCard">
<div class="label">Pulse</div>
<div id="pulse" class="value">--</div>
</div>

<div class="card" id="oxygenCard">
<div class="label">Oxygen</div>
<div id="oxygen" class="value">--</div>
</div>

<div class="card" id="hrCard">
<div class="label">Heart Rate</div>
<div id="hr" class="value">--</div>
</div>

<div class="card" id="bpCard">
<div class="label">Blood Pressure</div>
<div id="bp" class="value">--</div>
</div>

</div>

</div>

<script>

/* LOGIN SYSTEM */

function login(){

let id=document.getElementById("adminId").value;
let pass=document.getElementById("password").value;

if(id==="24391200@sastra.ac.in" && pass==="24391200")
{
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");
}
else
{
document.getElementById("loginError").innerHTML="Invalid Admin Login";
}

}


/* FIREBASE CONFIG */

var firebaseConfig = {
databaseURL:"https://heath-care-monitoring-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);

var database=firebase.database();

/* ECG GRAPH */

let lastUpdate=Date.now();
let ecgData=[];

const ctx=document.getElementById("ecgChart").getContext("2d");

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
data:ecgData,
borderColor:"#22c55e",
borderWidth:2,
pointRadius:0
}]
},
options:{
responsive:true,
animation:false,
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{display:false}
}
}
});


function updateECG(value){

ecgData.push(value);

if(ecgData.length>60){
ecgData.shift();
}

chart.data.labels.push("");

if(chart.data.labels.length>60){
chart.data.labels.shift();
}

chart.update();

}


/* READ REALTIME DATA FROM ICU_PATIENT */

database.ref("ICU_PATIENT").on("value",function(snapshot){

var data=snapshot.val();

if(!data)return;

lastUpdate=Date.now();

document.getElementById("status").innerHTML="Realtime Data Connected";

document.getElementById("pulse").innerHTML=data.pulse;
document.getElementById("oxygen").innerHTML=data.spo2;
document.getElementById("hr").innerHTML=data.pulse;
document.getElementById("bp").innerHTML=data.systolic+" / "+data.diastolic;

updateECG(data.ecg);

showCards();

});


function hideCards(){

document.getElementById("pulseCard").classList.add("hidden");
document.getElementById("oxygenCard").classList.add("hidden");
document.getElementById("hrCard").classList.add("hidden");
document.getElementById("bpCard").classList.add("hidden");
document.getElementById("ecgCard").classList.add("hidden");

document.getElementById("status").innerHTML="No realtime data detected";

}


function showCards(){

document.getElementById("pulseCard").classList.remove("hidden");
document.getElementById("oxygenCard").classList.remove("hidden");
document.getElementById("hrCard").classList.remove("hidden");
document.getElementById("bpCard").classList.remove("hidden");
document.getElementById("ecgCard").classList.remove("hidden");

}


setInterval(function(){

if(Date.now()-lastUpdate>8000){
hideCards();
}

},3000);

</script>

</body>
</html>
```
