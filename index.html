<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Health Monitoring Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

/* LOGIN */

#loginPage{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:10px;
margin:10px;
border-radius:5px;
border:none;
width:220px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#22c55e;
color:white;
cursor:pointer;
}

header{
background:#1e293b;
padding:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.value{
font-size:32px;
color:#22c55e;
margin-top:10px;
}

.label{
font-size:18px;
color:#cbd5f5;
}

.hidden{
display:none;
}

/* LARGE ECG */

#ecgCard{
grid-column:span 4;
height:320px;
}

canvas{
background:#020617;
border-radius:10px;
height:260px !important;
}

/* PATIENT DETAILS */

#patientDetails{
background:#1e293b;
padding:15px;
margin:20px;
border-radius:10px;
}

.status{
color:#f87171;
margin-bottom:20px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<h2>Health Monitoring System Login</h2>

<input type="text" id="userid" placeholder="User ID">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="loginStatus"></p>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none">

<header>
<h1>SHANMUGHA POLYTECHNIC COLLEGE</h1>
<h2>DEPARTMENT OF ELECTRICAL AND ELECTRONICS</h2>
<h3>Health Monitoring Dashboard</h3>
</header>

<!-- PATIENT DETAILS -->

<div id="patientDetails">

<h3>Patient Details</h3>

<p>Patient Name : <span id="pname">--</span></p>
<p>Age : <span id="page">--</span></p>
<p>Gender : <span id="pgender">--</span></p>
<p>Patient ID : <span id="pid">--</span></p>

</div>

<div class="status" id="status">
Waiting for realtime data...
</div>

<div class="container">

<!-- ECG -->

<div class="card hidden" id="ecgCard">
<div class="label">ECG Graph</div>
<canvas id="ecgChart"></canvas>
</div>

<!-- Pulse -->

<div class="card hidden" id="pulseCard">
<div class="label">Pulse</div>
<div id="pulse" class="value">--</div>
</div>

<!-- Oxygen -->

<div class="card hidden" id="oxygenCard">
<div class="label">Oxygen</div>
<div id="oxygen" class="value">--</div>
</div>

<!-- Heart Rate -->

<div class="card hidden" id="hrCard">
<div class="label">Heart Rate</div>
<div id="hr" class="value">--</div>
</div>

<!-- Blood Pressure -->

<div class="card hidden" id="bpCard">
<div class="label">Blood Pressure</div>
<div id="bp" class="value">--</div>
</div>

</div>
</div>

<script>

/* LOGIN */

function login(){

let id=document.getElementById("userid").value;
let pass=document.getElementById("password").value;

if(
(id==="24391200@sastra.ac.in" && pass==="24391200") ||
(id==="24303663@sastra.ac.in" && pass==="24303663")
){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

}
else{

document.getElementById("loginStatus").innerHTML="Invalid Login";

}

}

</script>

<script>

/* FIREBASE CONFIG */

var firebaseConfig = {

databaseURL:"https://heath-care-monitoring-default-rtdb.asia-southeast1.firebasedatabase.app/"

};

firebase.initializeApp(firebaseConfig);

var database=firebase.database();

/* ECG GRAPH */

let ecgData=[];

const ctx=document.getElementById("ecgChart").getContext("2d");

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
data:ecgData,
borderColor:"#22c55e",
borderWidth:2,
pointRadius:0
}]
},
options:{
responsive:true,
animation:false,
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{display:false}
}
}
});

/* ECG UPDATE */

function updateECG(value){

ecgData.push(value);

if(ecgData.length>80){
ecgData.shift();
}

chart.data.labels.push("");

if(chart.data.labels.length>80){
chart.data.labels.shift();
}

chart.update();

}

/* FIREBASE DATA LISTENER */

database.ref("/").on("value",function(snapshot){

var data=snapshot.val();

if(!data) return;

document.getElementById("status").innerHTML="Realtime Data Connected";

/* PATIENT DETAILS */

if(data.patient){

document.getElementById("pname").innerHTML=data.patient.name;
document.getElementById("page").innerHTML=data.patient.age;
document.getElementById("pgender").innerHTML=data.patient.gender;
document.getElementById("pid").innerHTML=data.patient.id;

}

/* PULSE */

if(data.Pulse){

document.getElementById("pulse").innerHTML=data.Pulse;
document.getElementById("pulseCard").classList.remove("hidden");

}

/* OXYGEN */

if(data.Oxygen){

document.getElementById("oxygen").innerHTML=data.Oxygen;
document.getElementById("oxygenCard").classList.remove("hidden");

}

/* HEART RATE */

if(data.HeartRate){

document.getElementById("hr").innerHTML=data.HeartRate;
document.getElementById("hrCard").classList.remove("hidden");

}

/* BLOOD PRESSURE */

if(data.BloodPressure){

document.getElementById("bp").innerHTML=data.BloodPressure;
document.getElementById("bpCard").classList.remove("hidden");

}

/* ECG */

if(data.ECG){

updateECG(data.ECG);
document.getElementById("ecgCard").classList.remove("hidden");

}

});

</script>

</body>
</html>
