<style>

body{

</head>

<body>

<div id="loginPage" class="login">

<h2>Admin Login</h2>

<input type="text" id="adminId" placeholder="Admin ID">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="dashboard" style="display:none">

<div class="header">

<h1>SHANMUGHA POLYTECHNIC COLLEGE</h1>

<h2>DEPARTMENT OF ELECTRICAL AND ELECTRONICS</h2>

</div>

<div class="container">

<div class="card">
<h3>Pulse</h3>
<div class="value" id="pulse">--</div>
</div>

<div class="card">
<h3>SpO2</h3>
<div class="value" id="spo2">--</div>
</div>

<div class="card">
<h3>Temperature</h3>
<div class="value" id="temp">--</div>
</div>

<div class="card">
<h3>Systolic</h3>
<div class="value" id="sys">--</div>
</div>

<div class="card">
<h3>Diastolic</h3>
<div class="value" id="dia">--</div>
</div>

</div>

<div id="chartBox">

<h2>ECG Real-Time Graph</h2>

<canvas id="ecgChart"></canvas>

</div>

</div>

<script>

/* ADMIN LOGIN */

function login(){

let id=document.getElementById("adminId").value
let pass=document.getElementById("password").value

if(id==="24391200@sastra.ac.in" && pass==="24391200")
{
document.getElementById("loginPage").style.display="none"
document.getElementById("dashboard").style.display="block"
}
else
{
document.getElementById("loginError").innerHTML="Invalid Login"
}

}

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyAkMIvf6mCqAomv5bvaguJp7gCiwCxK76g",
authDomain: "heath-care-monitoring.firebaseapp.com",
databaseURL: "https://heath-care-monitoring-default-rtdb.asia-southeast1.firebasedatabase.app",

messagingSenderId: "740485752935",
appId: "1:740485752935:web:838793c0e01bbb78cc0cc2"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database().ref("ICU_PATIENT");

/* ECG CHART */

var ctx=document.getElementById("ecgChart").getContext("2d");

var ecgChart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"ECG Signal",
data:[],
borderColor:"red",
fill:false
}]
},
options:{
animation:false,
scales:{
y:{
beginAtZero:true
}
}
}
});

/* REALTIME DATA */

db.on("value",function(snapshot){

let data=snapshot.val();

document.getElementById("pulse").innerHTML=data.pulse
document.getElementById("spo2").innerHTML=data.spo2
document.getElementById("temp").innerHTML=data.temperature
document.getElementById("sys").innerHTML=data.systolic
document.getElementById("dia").innerHTML=data.diastolic

let ecg=data.ecg

ecgChart.data.labels.push("")
ecgChart.data.datasets[0].data.push(ecg)

if(ecgChart.data.labels.length>30)
{
ecgChart.data.labels.shift()
ecgChart.data.datasets[0].data.shift()
}

ecgChart.update()

})

</script>

</body>
</html>
