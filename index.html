<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Monitoring Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

/* Headings */

.college{
font-size:26px;
font-weight:bold;
margin-top:20px;
}

.department{
font-size:20px;
margin-top:5px;
}

.dashboard{
font-size:28px;
margin-top:10px;
margin-bottom:20px;
}

/* Login Box */

.loginBox{
width:300px;
margin:auto;
margin-top:120px;
background:#1e293b;
padding:25px;
border-radius:10px;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

/* Dashboard Grid */

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
width:900px;
margin:auto;
margin-top:40px;
}

/* Cards */

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
font-size:20px;
}

.value{
font-size:30px;
margin-top:10px;
}

.patientText{
font-size:16px;
text-align:left;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="loginBox">

<h2>Admin Login</h2>

<input type="text" id="adminId" placeholder="Admin ID">

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<p id="error" style="color:red;"></p>

</div>


<!-- DASHBOARD PAGE -->

<div id="dashboardPage" style="display:none;">

<div class="college">SHANMUGHA POLYTECHNIC COLLEGE</div>

<div class="department">DEPARTMENT OF ELECTRICAL AND ELECTRONICS</div>

<div class="dashboard">Health Monitoring Dashboard</div>


<div class="container">

<!-- PATIENT DETAILS -->

<div class="card">

Patient Details

<div class="patientText">

Name : <span id="pname">-</span><br><br>

Age : <span id="age">-</span><br><br>

Patient ID : <span id="pid">-</span><br><br>

Sex : <span id="sex">-</span>

</div>

</div>


<!-- PULSE -->

<div class="card">
Pulse
<div class="value" id="pulse">-</div>
</div>


<!-- SPO2 -->

<div class="card">
SpO2
<div class="value" id="spo2">-</div>
</div>


<!-- TEMPERATURE -->

<div class="card">
Temperature
<div class="value" id="temp">-</div>
</div>


<!-- BLOOD PRESSURE -->

<div class="card">
Blood Pressure
<div class="value" id="bp">-</div>
</div>


<!-- RESPIRATION -->

<div class="card">
Respiration
<div class="value" id="resp">-</div>
</div>


<!-- ECG -->

<div class="card">
ECG
<div class="value" id="ecg">-</div>
</div>

</div>

</div>



<script>

/* ADMIN LOGIN */

function login(){

let id=document.getElementById("adminId").value;
let pass=document.getElementById("password").value;

if(
(id=="24391200@sastra.ac.in" && pass=="24391200") ||
(id=="24303663@sastra.ac.in" && pass=="24303663")
){

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboardPage").style.display="block";

}else{

document.getElementById("error").innerText="Invalid Admin ID or Password";

}

}


/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"AIzaSyAkMIvf6mCqAomv5bvaguJp7gCiwCxK76g",

authDomain:"heath-care-monitoring.firebaseapp.com",

databaseURL:"https://heath-care-monitoring-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"heath-care-monitoring"

};

firebase.initializeApp(firebaseConfig);


/* DATABASE REFERENCE */

var db = firebase.database().ref("healthData");


db.on("value",function(snapshot){

let data=snapshot.val() || {};


/* HEALTH PARAMETERS */

document.getElementById("pulse").innerText = data.pulse ?? "-";
document.getElementById("spo2").innerText = data.spo2 ?? "-";
document.getElementById("temp").innerText = data.temperature ?? "-";
document.getElementById("bp").innerText = data.bp ?? "-";
document.getElementById("resp").innerText = data.resp ?? "-";
document.getElementById("ecg").innerText = data.ecg ?? "-";


/* PATIENT DETAILS */

document.getElementById("pname").innerText = data.patient_name ?? "-";
document.getElementById("age").innerText = data.age ?? "-";
document.getElementById("pid").innerText = data.patient_id ?? "-";
document.getElementById("sex").innerText = data.sex ?? "-";

});

</script>

</body>
</html>
